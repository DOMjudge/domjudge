linter: jetbrains/qodana-cpp:2025.3-eap-clang18-privileged
bootstrap: |
  set -x
  echo $SHELL
  trace_on () {
    set -x
  }
  trace_off () {
    {
      set +x
    } 2>/dev/null
  }
  section_start_internal () {
    echo "::group::$1"
    trace_on
  }
  section_end_internal () {
    echo "::endgroup::"
    trace_on
  }
  section_start () {
    trace_off
    section_start_internal "$1"
  }
  section_end () {
    trace_off
    section_end_internal
  }

  set -x
  echo "Real start" | tee -a logs/bootstrap
  section_start "Install extra packages"
    apt-get update | tee -a logs/bootstrap
    apt-get install python3-pip libcgroup-dev clang-19 -y | tee -a logs/bootstrap
    pip3 install compiledb --break-system-packages | tee -a logs/bootstrap
  section_end
  #section_start "Setup simple configure script"
    make configure | tee -a logs/bootstrap
  #section_end
  #section_start "Configure with clang"
    CPP="/usr/bin/clang-19 -E" | tee -a logs/bootstrap
    CC=/usr/bin/clang-19 | tee -a logs/bootstrap
    CXX=/usr/bin/clang++-19 | tee -a logs/bootstrap
    export CC | tee -a logs/bootstrap
    export CPP | tee -a logs/bootstrap
    export CXX | tee -a logs/bootstrap
    ./configure --with-domjudge-user=qodana | tee -a logs/bootstrap
  #section_end
  #section_start "Capture the commands"
    compiledb make judgehost | tee -a logs/bootstrap
  #section_end
  #section_start "Show the resulting compilation commands"
    cat compile_commands.json | tee -a logs/bootstrap
  #section_end

linter: jetbrains/qodana-cpp:2025.3-eap-clang18-privileged
bootstrap: |
  set -x
  apt-get update
  apt-get install python3-pip libcgroup-dev clang-19 -y
  pip3 install compiledb --break-system-packages
  make configure
  CPP="/usr/bin/clang-19 -E"
  CC=/usr/bin/clang-19
  CXX=/usr/bin/clang++-19
  export CC
  export CPP
  export CXX
  ./configure --with-domjudge-user=qodana
  compiledb make judgehost
  cat compile_commands.json 
